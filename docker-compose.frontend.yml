services:
  siga-frontend:
    build:
      context: .
      dockerfile: src/WEB/SIGA.Frontend/devops/Dockerfile
    container_name: siga-frontend
    ports:
      - "3000:3000"
    env_file:
      - src/WEB/SIGA.Frontend/.env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
